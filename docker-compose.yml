services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findwork}
      POSTGRES_DB: ${POSTGRES_DB:-findwork}
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findwork} -d ${POSTGRES_DB:-findwork}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      # Внутри сети Compose хост БД — всегда `db`. Не подставляем DATABASE_URL из .env (там часто localhost).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-findwork}:${POSTGRES_PASSWORD:-findwork}@db:5432/${POSTGRES_DB:-findwork}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS:-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      HH_USER_AGENT: ${HH_USER_AGENT:-find-work-dashboard/1.0}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      GIGACHAT_AUTHORIZATION_KEY: ${GIGACHAT_AUTHORIZATION_KEY:-}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-false}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      DEFAULT_LLM_MIN_INTERVAL_SECONDS: ${DEFAULT_LLM_MIN_INTERVAL_SECONDS:-180}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${PUBLIC_URL:-http://localhost:8080}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api/v1}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      # NGINX_BIND=0.0.0.0 — слушать на всех интерфейсах (доступ из интернета, если порт открыт в фаерволе)
      - "${NGINX_BIND:-0.0.0.0}:${HTTP_PORT:-8080}:80"
      - "${NGINX_BIND:-0.0.0.0}:${HTTPS_PORT:-8443}:443"
    environment:
      NGINX_SERVER_NAMES: ${NGINX_SERVER_NAMES:-_}
      NGINX_LISTEN_PORT: ${NGINX_LISTEN_PORT:-80}
      NGINX_SSL_LISTEN_PORT: ${NGINX_SSL_LISTEN_PORT:-443}
      ENABLE_NGINX_SSL: ${ENABLE_NGINX_SSL:-0}
      SSL_CERTIFICATE_PATH: ${SSL_CERTIFICATE_PATH:-/etc/nginx/certs/fullchain.pem}
      SSL_CERTIFICATE_KEY_PATH: ${SSL_CERTIFICATE_KEY_PATH:-/etc/nginx/certs/privkey.pem}
    volumes:
      - ${NGINX_SSL_CERTS_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  pgdata:
